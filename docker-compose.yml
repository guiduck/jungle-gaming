services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      POSTGRES_EXTRA_DATABASES: games,wallets
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # RabbitMQ (with management UI)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ---------------------------------------------------------------------------
  # Keycloak (Identity Provider)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kong (API Gateway — DB-less / declarative)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9.1
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong:/kong:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Database migrations
  # ---------------------------------------------------------------------------
  games-migrations:
    build:
      context: ./services/games
      dockerfile: Dockerfile
    env_file:
      - ./services/games/.env.example
    command: ["bun", "run", "migration:up"]
    depends_on:
      postgres:
        condition: service_healthy

  wallets-migrations:
    build:
      context: ./services/wallets
      dockerfile: Dockerfile
    env_file:
      - ./services/wallets/.env.example
    command: ["bun", "run", "migration:up"]
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Games Service
  # ---------------------------------------------------------------------------
  games:
    build:
      context: ./services/games
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - ./services/games/.env.example
    environment:
      DEMO_DETERMINISTIC_ROUNDS: ${DEMO_DETERMINISTIC_ROUNDS:-false}
      DEMO_ROUND_SERVER_SEED: ${DEMO_ROUND_SERVER_SEED:-jungle-smoke-seed-2026}
      DEMO_ROUND_NONCE: ${DEMO_ROUND_NONCE:-smoke-round}
      ROUND_RUNNER_TICK_MS: ${ROUND_RUNNER_TICK_MS:-250}
      ROUND_BETTING_TICKS: ${ROUND_BETTING_TICKS:-12}
      ROUND_MULTIPLIER_STEP_BPS: ${ROUND_MULTIPLIER_STEP_BPS:-750}
      WALLET_RESULT_TIMEOUT_MS: ${WALLET_RESULT_TIMEOUT_MS:-25000}
      RABBITMQ_CONNECT_ATTEMPTS: ${RABBITMQ_CONNECT_ATTEMPTS:-180}
      RABBITMQ_CONNECT_RETRY_MS: ${RABBITMQ_CONNECT_RETRY_MS:-1000}
    depends_on:
      games-migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4001/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Wallets Service
  # ---------------------------------------------------------------------------
  wallets:
    build:
      context: ./services/wallets
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    env_file:
      - ./services/wallets/.env.example
    environment:
      RABBITMQ_CONNECT_ATTEMPTS: ${RABBITMQ_CONNECT_ATTEMPTS:-180}
      RABBITMQ_CONNECT_RETRY_MS: ${RABBITMQ_CONNECT_RETRY_MS:-1000}
    depends_on:
      wallets-migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4002/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend (placeholder — candidate implements)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_AUTH_MODE: keycloak
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: crash-game
      VITE_KEYCLOAK_CLIENT_ID: crash-game-client
    depends_on:
      kong:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
